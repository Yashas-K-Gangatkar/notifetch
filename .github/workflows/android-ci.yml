name: Android CI

on:
  pull_request:
    branches: [main]
    paths:
      - "notifetch-android/**"
      - ".github/workflows/android-ci.yml"
  push:
    branches: [main]
    paths:
      - "notifetch-android/**"

jobs:
  compile-and-lint:
    name: Kotlin Compile + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: notifetch-android

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;35.0.0 platforms;android-35"

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('notifetch-android/**/*.gradle*', 'notifetch-android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Compile Kotlin (debug)
        run: ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace

      - name: Compile Kotlin (release)
        run: ./gradlew :app:compileReleaseKotlin --no-daemon --stacktrace

      - name: Run lint
        run: ./gradlew :app:lintDebug --no-daemon
        continue-on-error: true # Lint warnings shouldn't block PRs

  build-debug-apk:
    name: Build Debug APK (smoke test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: compile-and-lint
    defaults:
      run:
        working-directory: notifetch-android

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;35.0.0 platforms;android-35"

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('notifetch-android/**/*.gradle*', 'notifetch-android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # Build a debug APK to verify the full pipeline (resource linking, etc.)
      # We don't build the release AAB here because that requires the keystore
      # which lives in GitHub Secrets — see android-release.yml for that.
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: notifetch-debug-apk
          path: notifetch-android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
