name: Android CI

on:
  pull_request:
    branches: [main]
    paths:
      - "notifetch-android/**"
      - ".github/workflows/android-ci.yml"
  push:
    branches: [main]
    paths:
      - "notifetch-android/**"

jobs:
  compile-and-lint:
    name: Kotlin Compile + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: notifetch-android

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;35.0.0 platforms;android-35"

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('notifetch-android/**/*.gradle*', 'notifetch-android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # v2.9.44: Skip debug variant — google-services.json only has the release
      # package (com.notifetch.app) registered, not com.notifetch.app.debug.
      # Debug build needs its own Firebase project registration to compile.
      # CI only validates the release variant (which is what we ship).
      - name: Compile Kotlin (release)
        run: ./gradlew :app:compileReleaseKotlin --no-daemon --stacktrace

      - name: Run lint
        run: ./gradlew :app:lintRelease --no-daemon
        continue-on-error: true # Lint warnings shouldn't block PRs

  build-release-apk:
    name: Build Release APK (smoke test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: compile-and-lint
    defaults:
      run:
        working-directory: notifetch-android

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools build-tools;35.0.0 platforms;android-35"

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('notifetch-android/**/*.gradle*', 'notifetch-android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # v2.9.44: Build release APK (not debug) because debug variant requires
      # a separate google-services.json registration for com.notifetch.app.debug
      # which we don't have. Release APK uses the release Firebase config.
      # We don't build the signed AAB here because that requires the keystore
      # which lives in GitHub Secrets — see android-release.yml for that.
      - name: Build release APK (unsigned)
        run: ./gradlew :app:assembleRelease --no-daemon
        env:
          NOTIFETCH_STORE_PASSWORD: ${{ secrets.NOTIFETCH_STORE_PASSWORD }}
          NOTIFETCH_KEY_ALIAS: ${{ secrets.NOTIFETCH_KEY_ALIAS }}
          NOTIFETCH_KEY_PASSWORD: ${{ secrets.NOTIFETCH_KEY_PASSWORD }}

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: notifetch-release-apk-unsigned
          path: notifetch-android/app/build/outputs/apk/release/*.apk
          retention-days: 7
